<div id="app-sales-conditions-modal" class="modal-backdrop">
  <div class="modal-card">
    <div class="modal-header d-flex justify-content-between align-items-center">
      <h5 class="m-0">Condizioni di vendita</h5>
      <button class="btn-close" (click)="close()" aria-label="Chiudi"></button>
    </div>

    <div class="modal-body">
      <div class="conditions-list">
        <div class="condition-row" *ngFor="let condition of conditions; let i = index; trackBy: trackByIndex">
          <div class="condition-input">
            <label class="form-label condition-label">Riga {{ i + 1 }}</label>
            <input
              type="text"
              class="form-control"
              [value]="condition"
              (input)="updateCondition(i, $any($event.target).value)"
              [placeholder]="'Riga ' + (i + 1)" />
          </div>
          <button
            type="button"
            class="btn btn-outline-danger"
            (click)="removeCondition(i)"
            [disabled]="conditions.length === 1 && !conditions[0].trim()">
            Rimuovi
          </button>
        </div>
      </div>
      <button
        type="button"
        class="btn btn-outline-primary mt-3"
        (click)="addCondition()"
        [disabled]="!canAddCondition">
        Aggiungi riga #{{ nextRowNumber }}
      </button>
    </div>

    <div class="modal-footer d-flex justify-content-end gap-2">
      <button class="btn btn-secondary" (click)="close()">Annulla</button>
      <button class="btn btn-primary" (click)="confirm()">Salva</button>
    </div>
  </div>
</div>
